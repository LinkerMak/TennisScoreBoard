<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Scoreboard | New Match</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>
<header class="header">
    <section class="nav-header">
        <div class="brand">
            <div class="nav-toggle">
                <img th:src="@{/resources/images/menu.png}" alt="Logo" class="logo">
            </div>
            <span class="logo-text">TennisScoreboard</span>
        </div>

        <nav class="nav-links">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link" th:href="@{/matches}">Matches</a>
        </nav>
    </section>
</header>

<main>
    <div class="container">
        <div>
            <h1>Start new match</h1>

            <div class="new-match-image"></div>

            <div class="form-container center">
                <form method="post" th:action="@{/matches/new-match}">
                    <p style="color: red;" th:if="${errorMessage}" th:text="${errorMessage}"></p>

                    <label class="label-player" for="playerOne">Player one</label>
                    <input
                            class="input-player"
                            id="playerOne"
                            name="playerOne"
                            placeholder="Name"
                            type="text"
                            required
                            title="Enter a name">

                    <label class="label-player" for="playerTwo">Player two</label>
                    <input
                            class="input-player"
                            id="playerTwo"
                            name="playerTwo"
                            placeholder="Name"
                            type="text"
                            required
                            title="Enter a name">

                    <input class="form-button" type="submit" value="Start">
                </form>
            </div>
        </div>
    </div>
</main>

<footer>
    <div class="footer">
        <p>
            &copy; Tennis Scoreboard, project from
            <a href="https://zhukovsd.github.io/java-backend-learning-course/" target="_blank" rel="noopener noreferrer">
                zhukovsd/java-backend-learning-course
            </a>
            roadmap.
        </p>
    </div>
</footer>

<script th:src="@{/resources/js/app.js}"></script>
</body>
</html>
