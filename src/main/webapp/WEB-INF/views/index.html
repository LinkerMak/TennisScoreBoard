<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Scoreboard | Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body>
<header class="header">
    <section class="nav-header">
        <div class="brand">
            <div class="nav-toggle">
                <img th:src="@{/resources/images/menu.png}" alt="Menu" class="logo">
            </div>
            <span class="logo-text">TennisScoreboard</span>
        </div>

        <nav class="nav-links">
            <a class="nav-link" th:href="@{/}">Home</a>
            <a class="nav-link" th:href="@{/matches}">Matches</a>
        </nav>
    </section>
</header>

<main>
    <div class="container">
        <h1>Welcome to Tennis Scoreboard</h1>
        <p>Manage your tennis matches, record results, and track rankings</p>

        <div class="welcome-image"></div>

        <div class="form-container center">
            <a class="homepage-action-button" th:href="@{/matches/new}">
                <button class="btn start-match" type="button">Start a new match</button>
            </a>

            <a class="homepage-action-button" th:href="@{/matches}">
                <button class="btn view-results" type="button">View match results</button>
            </a>
        </div>
    </div>
</main>

<footer>
    <div class="footer">
        <p>
            &copy; Tennis Scoreboard, project from
            <a href="https://zhukovsd.github.io/java-backend-learning-course/" target="_blank" rel="noopener noreferrer">
                zhukovsd/java-backend-learning-course
            </a>
            roadmap.
        </p>
    </div>
</footer>

<script th:src="@{/resources/js/app.js}"></script>
</body>
</html>
